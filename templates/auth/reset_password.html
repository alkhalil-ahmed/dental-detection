<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - DentAI-X</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">
<div class="auth-split">
  <div class="auth-brand">
    <div class="auth-brand-inner">
      <div class="auth-logo"><i class="fa-solid fa-tooth"></i><span>Dental<span>AI</span></span></div>
      <h2>Set New Password</h2>
      <p>Choose a strong password to secure your account.</p>
    </div>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-card">
      <div class="auth-icon-circle"><i class="fa-solid fa-lock-open"></i></div>
      <h1>Reset Password</h1>
      <p class="auth-sub">Enter your new password below</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message|safe }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('reset_password', token=token) }}">
        <div class="form-group">
          <label>New Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" id="pw1" placeholder="At least 6 characters" required autofocus/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="confirm_password" id="pw2" placeholder="Repeat new password" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fa-solid fa-floppy-disk"></i> Save New Password
        </button>
      </form>
    </div>
  </div>
</div>
<script>
function togglePw(id, btn) {
  const f = document.getElementById(id);
  f.type = f.type === 'password' ? 'text' : 'password';
  btn.querySelector('i').className = f.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
}
</script>
</body>
</html>
