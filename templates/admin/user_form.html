{% extends "base.html" %}
{% block title %}{{ action }} User - DentAI-X{% endblock %}
{% block page_title %}{{ action }} User{% endblock %}

{% block content %}
<div class="card form-card">
  <div class="card-header">
    <h2><i class="fa-solid fa-{{ 'user-plus' if action == 'Add' else 'user-pen' }}"></i> {{ action }} User</h2>
    <a href="{{ url_for('admin_users') }}" class="btn btn-sm btn-outline">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Username <span class="required">*</span></label>
          <input type="text" name="username" value="{{ user.username if user else '' }}" required placeholder="Enter username"/>
        </div>
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" name="email" value="{{ user.email if user else '' }}" required placeholder="email@example.com"/>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select name="role">
            <option value="dentist" {{ 'selected' if user and user.role == 'dentist' }}>Dentist</option>
            <option value="admin"   {{ 'selected' if user and user.role == 'admin' }}>Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password {% if user %}<span class="text-muted">(leave blank to keep current)</span>{% else %}<span class="required">*</span>{% endif %}</label>
          <input type="password" name="password" placeholder="Enter password" {% if not user %}required{% endif %}/>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" name="is_active" {{ 'checked' if not user or user.is_active }}/> Active Account
        </label>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('admin_users') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-floppy-disk"></i> {{ action }} User
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
