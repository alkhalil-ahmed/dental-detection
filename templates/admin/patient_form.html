{% extends "base.html" %}
{% block title %}{{ action }} Patient - DentAI-X{% endblock %}
{% block page_title %}{{ action }} Patient{% endblock %}

{% block content %}
<div class="card form-card">
  <div class="card-header">
    <h2><i class="fa-solid fa-{{ 'user-plus' if action == 'Add' else 'user-pen' }}"></i> {{ action }} Patient</h2>
    <a href="{{ url_for('admin_patients') }}" class="btn btn-sm btn-outline">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" name="name" value="{{ patient.name if patient else '' }}" required placeholder="Patient full name"/>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" name="dob" value="{{ patient.dob if patient else '' }}"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select name="gender">
            <option value=""> -  Select  - </option>
            <option value="Male"   {{ 'selected' if patient and patient.gender == 'Male' }}>Male</option>
            <option value="Female" {{ 'selected' if patient and patient.gender == 'Female' }}>Female</option>
            <option value="Other"  {{ 'selected' if patient and patient.gender == 'Other' }}>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" value="{{ patient.phone if patient else '' }}" placeholder="+1 234 567 8900"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" value="{{ patient.email if patient else '' }}" placeholder="patient@email.com"/>
        </div>
        <div class="form-group">
          <label>IC / Passport Number</label>
          <input type="text" name="ic_number" value="{{ patient.ic_number if patient else '' }}" placeholder="e.g. 900101-14-5678 or A12345678"/>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" rows="3" placeholder="Medical notes, allergies, etc.">{{ patient.notes if patient else '' }}</textarea>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('admin_patients') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-floppy-disk"></i> {{ action }} Patient
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
